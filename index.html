<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Museu Virtual da História da Computação</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      /* ============================================================
         SISTEMA DE AVALIAÇÃO
         ============================================================ */
      :root {
        --aval-surface: #161A3A;
        --aval-border:  rgba(92,105,255,.22);
        --aval-cyan:    #0CFFE1;
        --aval-violet:  #5B4EFF;
        --aval-text:    #E2E6FF;
        --aval-muted:   #7B82B0;
        --aval-dim:     #4A5080;
        --aval-star:    #F0C040;
        --aval-radius:  16px;
      }

      /* --- Botão flutuante --- */
      #aval-fab {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9000;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, var(--aval-violet), #3DCEFF);
        color: #fff;
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-size: .65rem;
        font-weight: 700;
        letter-spacing: .1em;
        text-transform: uppercase;
        padding: 12px 20px;
        border: none;
        border-radius: 100px;
        cursor: pointer;
        box-shadow: 0 4px 24px rgba(91,78,255,.5), 0 0 0 1px rgba(12,255,225,.2);
        transition: transform .2s, box-shadow .2s;
        pointer-events: all;
        animation: fab-in .5s .6s cubic-bezier(0.34,1.4,0.64,1) both;
      }
      #aval-fab:hover {
        transform: translateY(-3px) scale(1.04);
        box-shadow: 0 8px 36px rgba(12,255,225,.4), 0 0 0 1px rgba(12,255,225,.35);
      }
      @keyframes fab-in {
        from { opacity: 0; transform: translateY(20px) scale(.88); }
        to   { opacity: 1; transform: translateY(0)   scale(1);    }
      }

      /* --- Overlay --- */
      #aval-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(4, 5, 18, .82);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      #aval-overlay.hidden { display: none !important; }

      /* --- Card --- */
      .aval-card {
        position: relative;
        background: var(--aval-surface);
        border: 1px solid var(--aval-border);
        border-radius: var(--aval-radius);
        padding: 40px 36px 36px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 0 80px rgba(12,255,225,.07), 0 0 40px rgba(91,78,255,.12);
        animation: card-in .3s cubic-bezier(0.34,1.4,0.64,1) both;
      }
      @keyframes card-in {
        from { opacity: 0; transform: translateY(24px) scale(.97); }
        to   { opacity: 1; transform: translateY(0)   scale(1);    }
      }

      /* --- Fechar --- */
      .aval-close {
        position: absolute;
        top: 14px; right: 16px;
        width: 32px; height: 32px;
        background: transparent;
        border: 1px solid var(--aval-border);
        border-radius: 8px;
        color: var(--aval-muted);
        font-size: .85rem;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: color .2s, border-color .2s, background .2s;
      }
      .aval-close:hover { color: var(--aval-cyan); border-color: var(--aval-cyan); background: rgba(12,255,225,.06); }

      /* --- Header --- */
      .aval-header { text-align: center; margin-bottom: 28px; }
      .aval-header .ico { font-size: 2.2rem; margin-bottom: 10px; }
      .aval-header h2 {
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-size: 1.15rem; font-weight: 800; letter-spacing: .04em;
        color: var(--aval-text); margin: 0 0 6px;
      }
      .aval-header p { font-size: .88rem; color: var(--aval-muted); margin: 0; }

      /* --- Critérios --- */
      .aval-criterios { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
      .aval-criterio {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        background: rgba(7,9,26,.5);
        border: 1px solid var(--aval-border);
        border-radius: 10px; padding: 11px 16px;
        transition: border-color .2s;
      }
      .aval-criterio.rated { border-color: rgba(12,255,225,.3); }
      .aval-criterio-label {
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-size: .58rem; font-weight: 700; letter-spacing: .1em;
        text-transform: uppercase; color: var(--aval-muted);
        flex-shrink: 0; min-width: 115px;
      }
      .aval-stars { display: flex; gap: 4px; align-items: center; }
      .aval-star {
        font-size: 1.7rem; color: var(--aval-dim);
        cursor: pointer; transition: color .1s, transform .1s;
        user-select: none; line-height: 1;
      }
      .aval-star.on { color: var(--aval-star); transform: scale(1.15); }

      /* --- Comentário --- */
      .aval-clabel {
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-size: .6rem; font-weight: 700; letter-spacing: .1em;
        text-transform: uppercase; color: var(--aval-muted);
        display: block; margin-bottom: 6px;
      }
      .aval-clabel .opt { font-size: .75em; text-transform: none; letter-spacing: 0; opacity: .55; }
      .aval-textarea {
        width: 100%; box-sizing: border-box;
        background: rgba(7,9,26,.7); border: 1px solid var(--aval-border);
        border-radius: 10px; color: var(--aval-text);
        font-family: 'DM Sans', 'Segoe UI', sans-serif; font-size: .9rem;
        padding: 10px 14px; resize: none; height: 80px; outline: none;
        transition: border-color .2s, box-shadow .2s; margin-bottom: 4px;
      }
      .aval-textarea:focus { border-color: var(--aval-cyan); box-shadow: 0 0 0 3px rgba(12,255,225,.1); }
      .aval-char { font-size: .72rem; color: var(--aval-dim); text-align: right; display: block; margin-bottom: 14px; }

      /* --- Erro --- */
      .aval-erro {
        display: block; font-size: .78rem; color: #ff5f6b;
        min-height: 18px; margin-bottom: 10px; text-align: center;
      }

      /* --- Botão enviar --- */
      .aval-btn {
        width: 100%; display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, var(--aval-violet), #3DCEFF); color: #fff;
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-size: .72rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
        padding: 14px 28px; border: none; border-radius: 10px; cursor: pointer;
        transition: transform .2s, box-shadow .2s; box-shadow: 0 4px 24px rgba(91,78,255,.35);
      }
      .aval-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 36px rgba(12,255,225,.3); }
      .aval-btn:disabled { opacity: .6; cursor: not-allowed; }

      /* --- Sucesso --- */
      #aval-sucesso {
        display: none; flex-direction: column; align-items: center;
        gap: 10px; text-align: center; padding: 12px 0 0;
      }
      #aval-sucesso.show { display: flex; animation: fade-in .3s ease both; }
      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
      #aval-sucesso .ico {
        width: 48px; height: 48px;
        background: linear-gradient(135deg, var(--aval-cyan), var(--aval-violet));
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        font-size: 1.4rem; color: #fff; font-weight: 700;
        box-shadow: 0 0 24px rgba(12,255,225,.35);
      }
      #aval-sucesso h3 {
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-size: 1rem; font-weight: 800; color: var(--aval-text); margin: 0;
      }
      #aval-sucesso p { font-size: .88rem; color: var(--aval-muted); margin: 0; }

      @media (max-width: 520px) {
        .aval-card { padding: 28px 18px 22px; }
        .aval-criterio { flex-direction: column; align-items: flex-start; gap: 8px; }
        .aval-criterio-label { min-width: unset; }
        .aval-star { font-size: 1.5rem; }
        #aval-fab { bottom: 16px; right: 16px; padding: 10px 16px; font-size: .6rem; }
      }
    </style>
  </head>
  <body>

    <!-- ========================================================
         INTERCEPTOR DE TECLADO — deve rodar ANTES do Unity loader
         Envolve os listeners de keyboard da Unity com uma guarda
         que os desativa enquanto o modal de avaliação está aberto.
         ======================================================== -->
    <script>
      var _modalOpen = false;

      (function () {
        var _wAEL = window.addEventListener.bind(window);
        var _dAEL = document.addEventListener.bind(document);
        var KB = { keydown: 1, keyup: 1, keypress: 1 };

        function wrap(fn) {
          return function (e) {
            if (_modalOpen) return;
            return fn.apply(this, arguments);
          };
        }

        window.addEventListener = function (type, fn, opts) {
          _wAEL(type, KB[type] ? wrap(fn) : fn, opts);
        };
        document.addEventListener = function (type, fn, opts) {
          _dAEL(type, KB[type] ? wrap(fn) : fn, opts);
        };
      })();
    </script>

    <!-- ========== UNITY CONTAINER ========== -->
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">EdukaLabsWeb</div>
      </div>
    </div>

    <!-- ========== BOTÃO FLUTUANTE ========== -->
    <button id="aval-fab" onclick="window.location.href='avaliacao.html'">
      ⭐ Avaliar Experiência
    </button>

    <!-- ========== MODAL ========== -->
    <div id="aval-overlay" class="hidden" onclick="if(event.target===this)fecharAvaliacao()">
      <div class="aval-card">

        <button class="aval-close" onclick="fecharAvaliacao()">✕</button>

        <div class="aval-header">
          <div class="ico">⭐</div>
          <h2>Avalie a Experiência</h2>
          <p>Como foi explorar o Museu Virtual?</p>
        </div>

        <div class="aval-criterios">
          <div class="aval-criterio" id="row-navegacao">
            <span class="aval-criterio-label">Navegação 3D</span>
            <div class="aval-stars" data-key="navegacao">
              <span class="aval-star" data-v="1">★</span><span class="aval-star" data-v="2">★</span>
              <span class="aval-star" data-v="3">★</span><span class="aval-star" data-v="4">★</span>
              <span class="aval-star" data-v="5">★</span>
            </div>
          </div>
          <div class="aval-criterio" id="row-desempenho">
            <span class="aval-criterio-label">Desempenho</span>
            <div class="aval-stars" data-key="desempenho">
              <span class="aval-star" data-v="1">★</span><span class="aval-star" data-v="2">★</span>
              <span class="aval-star" data-v="3">★</span><span class="aval-star" data-v="4">★</span>
              <span class="aval-star" data-v="5">★</span>
            </div>
          </div>
          <div class="aval-criterio" id="row-visual">
            <span class="aval-criterio-label">Qualidade Visual</span>
            <div class="aval-stars" data-key="visual">
              <span class="aval-star" data-v="1">★</span><span class="aval-star" data-v="2">★</span>
              <span class="aval-star" data-v="3">★</span><span class="aval-star" data-v="4">★</span>
              <span class="aval-star" data-v="5">★</span>
            </div>
          </div>
          <div class="aval-criterio" id="row-conteudo">
            <span class="aval-criterio-label">Conteúdo Histórico</span>
            <div class="aval-stars" data-key="conteudo">
              <span class="aval-star" data-v="1">★</span><span class="aval-star" data-v="2">★</span>
              <span class="aval-star" data-v="3">★</span><span class="aval-star" data-v="4">★</span>
              <span class="aval-star" data-v="5">★</span>
            </div>
          </div>
        </div>

        <label class="aval-clabel" for="aval-comentario">
          Comentário <span class="opt">(opcional)</span>
        </label>
        <textarea id="aval-comentario" class="aval-textarea"
          placeholder="O que mais gostou ou poderia melhorar?"
          maxlength="300"
          oninput="document.getElementById('aval-char').textContent=this.value.length+'/300'"></textarea>
        <span class="aval-char" id="aval-char">0/300</span>

        <span class="aval-erro" id="aval-erro"></span>

        <button class="aval-btn" id="aval-btn" onclick="enviarAvaliacao()">
          Enviar Avaliação →
        </button>

        <div id="aval-sucesso">
          <div class="ico">✓</div>
          <h3>Obrigado!</h3>
          <p>Sua avaliação foi registrada com sucesso.</p>
        </div>

      </div>
    </div>

    <!-- ========== UNITY LOADER ========== -->
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() { warningBanner.removeChild(div); updateBannerVisibility(); }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var config = {
        arguments: [],
        dataUrl:      buildUrl + "/MVHC_UNITY_WEB.data.unityweb",
        frameworkUrl: buildUrl + "/MVHC_UNITY_WEB.framework.js.unityweb",
        codeUrl:      buildUrl + "/MVHC_UNITY_WEB.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName:   "LabIFCE",
        productName:   "EdukaLabsWeb",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width  = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = buildUrl + "/MVHC_UNITY_WEB.loader.js";
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => unityInstance.SetFullscreen(1);
        }).catch((message) => { alert(message); });
      };
      document.body.appendChild(script);
    </script>

    <!-- ========== AVALIAÇÃO — UI (script normal, sem module) ========== -->
    <script>
      var notas = { navegacao: 0, desempenho: 0, visual: 0, conteudo: 0 };

      /* Estrelas */
      document.querySelectorAll('.aval-stars').forEach(function(group) {
        var key   = group.dataset.key;
        var stars = Array.from(group.querySelectorAll('.aval-star'));

        function paint(val) {
          stars.forEach(function(s) {
            s.classList.toggle('on', parseInt(s.dataset.v) <= val);
          });
        }

        stars.forEach(function(star) {
          star.addEventListener('mouseover', function() { paint(parseInt(star.dataset.v)); });
          star.addEventListener('mouseout',  function() { paint(notas[key]); });
          star.addEventListener('click', function() {
            notas[key] = parseInt(star.dataset.v);
            paint(notas[key]);
            document.getElementById('row-' + key).classList.add('rated');
            document.getElementById('aval-erro').textContent = '';
          });
        });
      });

      /* Abrir / fechar */
      function abrirAvaliacao() {
        resetAvaliacao();

        /* 1. Libera o pointer lock da Unity (para câmera FPS) */
        if (document.exitPointerLock) document.exitPointerLock();

        /* 2. Tira o foco do canvas (para teclado) */
        var canvas = document.getElementById('unity-canvas');
        if (canvas) canvas.blur();

        /* 3. Ativa a guarda — listeners da Unity são ignorados enquanto modal estiver aberto */
        _modalOpen = true;

        document.getElementById('aval-overlay').classList.remove('hidden');

        /* 4. Foca o textarea para o usuário já poder digitar */
        setTimeout(function() {
          document.getElementById('aval-comentario').focus();
        }, 80);
      }

      function fecharAvaliacao() {
        document.getElementById('aval-overlay').classList.add('hidden');

        /* Desativa a guarda e devolve foco à Unity */
        _modalOpen = false;
        var canvas = document.getElementById('unity-canvas');
        if (canvas) canvas.focus();
      }

      function resetAvaliacao() {
        Object.keys(notas).forEach(function(k) { notas[k] = 0; });

        document.querySelectorAll('.aval-star').forEach(function(s) { s.classList.remove('on'); });
        document.querySelectorAll('.aval-criterio').forEach(function(r) { r.classList.remove('rated'); });

        var ta = document.getElementById('aval-comentario');
        if (ta) ta.value = '';
        var ch = document.getElementById('aval-char');
        if (ch) ch.textContent = '0/300';

        document.getElementById('aval-erro').textContent = '';

        /* Restaura formulário */
        document.querySelector('.aval-criterios').style.display = '';
        document.querySelector('.aval-clabel').style.display    = '';
        document.getElementById('aval-comentario').style.display = '';
        document.getElementById('aval-char').style.display       = '';
        var btn = document.getElementById('aval-btn');
        btn.style.display  = '';
        btn.disabled       = false;
        btn.textContent    = 'Enviar Avaliação →';
        var suc = document.getElementById('aval-sucesso');
        suc.classList.remove('show');
      }

      /* Validação e envio — chama o Firebase que fica no module */
      function enviarAvaliacao() {
        var ausentes = Object.entries(notas)
          .filter(function(e) { return e[1] === 0; })
          .map(function(e) {
            return { navegacao: 'Navegação 3D', desempenho: 'Desempenho',
                     visual: 'Visual', conteudo: 'Conteúdo' }[e[0]];
          });

        if (ausentes.length) {
          document.getElementById('aval-erro').textContent = 'Avalie: ' + ausentes.join(', ');
          return;
        }

        var btn = document.getElementById('aval-btn');
        btn.disabled    = true;
        btn.textContent = 'Enviando…';
        document.getElementById('aval-erro').textContent = '';

        var comentario = (document.getElementById('aval-comentario').value || '').trim();
        var media      = (notas.navegacao + notas.desempenho + notas.visual + notas.conteudo) / 4;

        /* Dispara o save no Firebase (definido pelo module abaixo) */
        if (typeof window._avalSave === 'function') {
          window._avalSave(Object.assign({}, notas), parseFloat(media.toFixed(2)), comentario || null)
            .then(function() { mostrarSucesso(); })
            .catch(function(err) {
              console.error(err);
              document.getElementById('aval-erro').textContent = 'Erro ao enviar. Tente novamente.';
              btn.disabled    = false;
              btn.textContent = 'Enviar Avaliação →';
            });
        } else {
          /* Firebase ainda não carregou — tenta de novo em 500ms */
          setTimeout(enviarAvaliacao, 500);
        }
      }

      function mostrarSucesso() {
        document.querySelector('.aval-criterios').style.display = 'none';
        document.querySelector('.aval-clabel').style.display    = 'none';
        document.getElementById('aval-comentario').style.display = 'none';
        document.getElementById('aval-char').style.display       = 'none';
        document.getElementById('aval-btn').style.display        = 'none';
        document.getElementById('aval-sucesso').classList.add('show');
        setTimeout(fecharAvaliacao, 3000);
      }
    </script>

    <!-- ========== FIREBASE (module) ========== -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
      import { getFirestore, collection, addDoc, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

      const app = initializeApp({
        apiKey:            "AIzaSyACU2e2XRbrVH4_iYjF9_memwqxcxBvTzg",
        authDomain:        "mvhc-d8cde.firebaseapp.com",
        projectId:         "mvhc-d8cde",
        storageBucket:     "mvhc-d8cde.firebasestorage.app",
        messagingSenderId: "520624726072",
        appId:             "1:520624726072:web:801b9ede2d99dec62186cd"
      });

      const ref = collection(getFirestore(app), "avaliacoes");

      /* Expõe a função de save para o script normal */
      window._avalSave = function(notas, media, comentario) {
        return addDoc(ref, {
          navegacao:  notas.navegacao,
          desempenho: notas.desempenho,
          visual:     notas.visual,
          conteudo:   notas.conteudo,
          media,
          comentario,
          timestamp: serverTimestamp()
        });
      };
    </script>

  </body>
</html>
