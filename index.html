<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>EdukaLabsWeb | LabIFCE</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>

      <div id="unity-loading-bar">
        <div id="loading-content">
          <div id="loading-logo">
            <span class="logo-main">EdukaLabs</span><span class="logo-accent">Web</span>
          </div>
          <p id="loading-subtitle">LabIFCE &middot; v0.1.0</p>
          <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
          </div>
          <p id="loading-percent">0%</p>
        </div>
      </div>

      <div id="unity-warning"></div>

      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-build-title">EdukaLabsWeb</div>
        <div id="unity-fullscreen-button" title="Tela cheia"></div>
      </div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') {
          div.className = 'banner-error';
        } else {
          if (type == 'warning') div.className = 'banner-warning';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/MVHC_UNITY_WEB.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/MVHC_UNITY_WEB.data",
        frameworkUrl: buildUrl + "/MVHC_UNITY_WEB.framework.js",
        codeUrl: buildUrl + "/MVHC_UNITY_WEB.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "LabIFCE",
        productName: "EdukaLabsWeb",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "flex";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          var pct = Math.round(progress * 100);
          document.querySelector("#unity-progress-bar-full").style.width = pct + "%";
          var pctEl = document.querySelector("#loading-percent");
          if (pctEl) pctEl.textContent = pct + "%";
        }).then((unityInstance) => {
          var loadingBar = document.querySelector("#unity-loading-bar");
          loadingBar.classList.add("fade-out");
          setTimeout(() => { loadingBar.style.display = "none"; }, 600);
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
