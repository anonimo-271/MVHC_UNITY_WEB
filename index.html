<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Museu Virtual da História da Computação</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      /* ============================================================
         MODAL DE AVALIAÇÃO
         ============================================================ */
      :root {
        --aval-bg:      #07091A;
        --aval-surface: #161A3A;
        --aval-border:  rgba(92,105,255,.22);
        --aval-cyan:    #0CFFE1;
        --aval-violet:  #5B4EFF;
        --aval-violet2: #8B7EFF;
        --aval-text:    #E2E6FF;
        --aval-muted:   #7B82B0;
        --aval-dim:     #4A5080;
        --aval-radius:  16px;
        --aval-star:    #F0C040;
      }

      .aval-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(4, 5, 18, .80);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        animation: aval-fade-in .25s ease both;
      }

      .aval-overlay.hidden { display: none !important; }

      @keyframes aval-fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      .aval-card {
        position: relative;
        background: var(--aval-surface);
        border: 1px solid var(--aval-border);
        border-radius: var(--aval-radius);
        padding: 40px 36px 36px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 0 80px rgba(12,255,225,.07), 0 0 40px rgba(91,78,255,.12);
        animation: aval-card-in .3s cubic-bezier(0.34,1.4,0.64,1) both;
      }

      @keyframes aval-card-in {
        from { opacity: 0; transform: translateY(24px) scale(.97); }
        to   { opacity: 1; transform: translateY(0)   scale(1);    }
      }

      .aval-close {
        position: absolute;
        top: 14px;
        right: 16px;
        width: 32px;
        height: 32px;
        background: transparent;
        border: 1px solid var(--aval-border);
        border-radius: 8px;
        color: var(--aval-muted);
        font-size: .85rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color .2s, border-color .2s, background .2s;
      }
      .aval-close:hover { color: var(--aval-cyan); border-color: var(--aval-cyan); background: rgba(12,255,225,.06); }

      /* Header */
      .aval-header {
        text-align: center;
        margin-bottom: 28px;
      }

      .aval-icon {
        font-size: 2.2rem;
        margin-bottom: 10px;
      }

      .aval-title {
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-size: 1.15rem;
        font-weight: 800;
        letter-spacing: .04em;
        color: var(--aval-text);
        margin-bottom: 6px;
      }

      .aval-sub {
        font-size: .88rem;
        color: var(--aval-muted);
        margin: 0;
      }

      /* Critérios */
      .aval-criterios {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 22px;
      }

      .aval-criterio {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        background: rgba(7,9,26,.5);
        border: 1px solid var(--aval-border);
        border-radius: 10px;
        padding: 12px 16px;
        transition: border-color .2s;
      }

      .aval-criterio:has(.aval-star.selected) {
        border-color: rgba(12,255,225,.3);
      }

      .aval-criterio-label {
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-size: .6rem;
        font-weight: 700;
        letter-spacing: .1em;
        text-transform: uppercase;
        color: var(--aval-muted);
        flex-shrink: 0;
        min-width: 120px;
      }

      .aval-stars {
        display: flex;
        gap: 4px;
        align-items: center;
      }

      .aval-star {
        font-size: 1.7rem;
        color: var(--aval-dim);
        cursor: pointer;
        transition: color .12s, transform .12s;
        user-select: none;
        line-height: 1;
      }

      .aval-star.hovered,
      .aval-star.selected {
        color: var(--aval-star);
        transform: scale(1.15);
      }

      /* Comentário */
      .aval-comment-label {
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-size: .62rem;
        font-weight: 700;
        letter-spacing: .1em;
        text-transform: uppercase;
        color: var(--aval-muted);
        display: block;
        margin-bottom: 6px;
      }

      .aval-comment-label .optional {
        font-size: .75em;
        text-transform: none;
        letter-spacing: 0;
        opacity: .55;
      }

      .aval-textarea {
        width: 100%;
        background: rgba(7,9,26,.7);
        border: 1px solid var(--aval-border);
        border-radius: 10px;
        color: var(--aval-text);
        font-family: 'DM Sans', 'Segoe UI', sans-serif;
        font-size: .9rem;
        padding: 10px 14px;
        resize: none;
        height: 80px;
        box-sizing: border-box;
        outline: none;
        transition: border-color .2s, box-shadow .2s;
        margin-bottom: 6px;
      }

      .aval-textarea:focus {
        border-color: var(--aval-cyan);
        box-shadow: 0 0 0 3px rgba(12,255,225,.1);
      }

      .aval-char {
        font-size: .72rem;
        color: var(--aval-dim);
        text-align: right;
        display: block;
        margin-bottom: 16px;
      }

      /* Erro */
      .aval-erro {
        display: block;
        font-size: .78rem;
        color: #ff5f6b;
        min-height: 18px;
        margin-bottom: 10px;
        text-align: center;
      }

      /* Botão enviar */
      .aval-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: linear-gradient(135deg, var(--aval-violet), #3DCEFF);
        color: #fff;
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-size: .72rem;
        font-weight: 700;
        letter-spacing: .1em;
        text-transform: uppercase;
        padding: 14px 28px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: transform .2s, box-shadow .2s;
        box-shadow: 0 4px 24px rgba(91,78,255,.35);
      }

      .aval-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 36px rgba(12,255,225,.3);
      }

      .aval-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

      /* Sucesso */
      .aval-sucesso {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        text-align: center;
        padding: 12px 0 0;
        animation: aval-fade-in .3s ease both;
      }

      .aval-sucesso.hidden { display: none !important; }

      .aval-sucesso-ico {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, var(--aval-cyan), var(--aval-violet));
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        color: #fff;
        font-weight: 700;
        box-shadow: 0 0 24px rgba(12,255,225,.35);
      }

      .aval-sucesso h3 {
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-size: 1rem;
        font-weight: 800;
        color: var(--aval-text);
        letter-spacing: .04em;
        margin: 0;
      }

      .aval-sucesso p {
        font-size: .88rem;
        color: var(--aval-muted);
        margin: 0;
      }

      /* Botão flutuante */
      .aval-fab {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 8000;
        display: flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, var(--aval-violet), #3DCEFF);
        color: #fff;
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-size: .65rem;
        font-weight: 700;
        letter-spacing: .1em;
        text-transform: uppercase;
        padding: 12px 20px;
        border: none;
        border-radius: 100px;
        cursor: pointer;
        box-shadow: 0 4px 24px rgba(91,78,255,.45), 0 0 0 1px rgba(12,255,225,.15);
        transition: transform .2s, box-shadow .2s;
        animation: fab-in .4s .8s cubic-bezier(0.34,1.4,0.64,1) both;
      }

      .aval-fab:hover {
        transform: translateY(-3px) scale(1.04);
        box-shadow: 0 8px 36px rgba(12,255,225,.35), 0 0 0 1px rgba(12,255,225,.3);
      }

      .aval-fab-star { font-size: 1rem; }

      @keyframes fab-in {
        from { opacity: 0; transform: translateY(20px) scale(.9); }
        to   { opacity: 1; transform: translateY(0)   scale(1);   }
      }

      /* Responsivo mobile */
      @media (max-width: 520px) {
        .aval-card { padding: 28px 20px 24px; }
        .aval-criterio { flex-direction: column; align-items: flex-start; gap: 8px; }
        .aval-criterio-label { min-width: unset; }
        .aval-star { font-size: 1.5rem; }
        .aval-fab { bottom: 16px; right: 16px; padding: 10px 16px; font-size: .6rem; }
      }
    </style>
  </head>
  <body>

    <!-- ============================================================
         UNITY CONTAINER
         ============================================================ -->
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">EdukaLabsWeb</div>
      </div>
    </div>

    <!-- ============================================================
         BOTÃO FLUTUANTE DE AVALIAÇÃO
         ============================================================ -->
    <button class="aval-fab" onclick="window.abrirAvaliacao && window.abrirAvaliacao()">
      <span class="aval-fab-star">⭐</span>
      Avaliar Experiência
    </button>

    <!-- ============================================================
         MODAL DE AVALIAÇÃO
         ============================================================ -->
    <div id="aval-overlay" class="aval-overlay hidden" onclick="fecharAvaliacaoOverlay(event)">
      <div class="aval-card">

        <button class="aval-close" onclick="fecharAvaliacao()" title="Fechar">✕</button>

        <!-- Header -->
        <div class="aval-header">
          <div class="aval-icon">⭐</div>
          <h2 class="aval-title">Avalie a Experiência</h2>
          <p class="aval-sub">Como foi explorar o Museu Virtual?</p>
        </div>

        <!-- Critérios com estrelas -->
        <div class="aval-criterios" id="aval-form-body">

          <div class="aval-criterio">
            <span class="aval-criterio-label">Navegação 3D</span>
            <div class="aval-stars" data-criterio="navegacao">
              <span class="aval-star" data-valor="1">★</span>
              <span class="aval-star" data-valor="2">★</span>
              <span class="aval-star" data-valor="3">★</span>
              <span class="aval-star" data-valor="4">★</span>
              <span class="aval-star" data-valor="5">★</span>
            </div>
          </div>

          <div class="aval-criterio">
            <span class="aval-criterio-label">Desempenho</span>
            <div class="aval-stars" data-criterio="desempenho">
              <span class="aval-star" data-valor="1">★</span>
              <span class="aval-star" data-valor="2">★</span>
              <span class="aval-star" data-valor="3">★</span>
              <span class="aval-star" data-valor="4">★</span>
              <span class="aval-star" data-valor="5">★</span>
            </div>
          </div>

          <div class="aval-criterio">
            <span class="aval-criterio-label">Qualidade Visual</span>
            <div class="aval-stars" data-criterio="visual">
              <span class="aval-star" data-valor="1">★</span>
              <span class="aval-star" data-valor="2">★</span>
              <span class="aval-star" data-valor="3">★</span>
              <span class="aval-star" data-valor="4">★</span>
              <span class="aval-star" data-valor="5">★</span>
            </div>
          </div>

          <div class="aval-criterio">
            <span class="aval-criterio-label">Conteúdo Histórico</span>
            <div class="aval-stars" data-criterio="conteudo">
              <span class="aval-star" data-valor="1">★</span>
              <span class="aval-star" data-valor="2">★</span>
              <span class="aval-star" data-valor="3">★</span>
              <span class="aval-star" data-valor="4">★</span>
              <span class="aval-star" data-valor="5">★</span>
            </div>
          </div>

        </div>

        <!-- Comentário opcional -->
        <label class="aval-comment-label" for="aval-comentario">
          Comentário <span class="optional">(opcional)</span>
        </label>
        <textarea id="aval-comentario" class="aval-textarea"
                  placeholder="O que mais gostou ou poderia melhorar?"
                  maxlength="300"
                  oninput="document.getElementById('aval-char').textContent = this.value.length + '/300'"></textarea>
        <span class="aval-char" id="aval-char">0/300</span>

        <!-- Erro -->
        <span class="aval-erro" id="aval-erro"></span>

        <!-- Botão -->
        <button class="aval-btn" id="aval-btn" onclick="enviarAvaliacao()">
          Enviar Avaliação →
        </button>

        <!-- Sucesso (oculto até envio) -->
        <div class="aval-sucesso hidden" id="aval-sucesso">
          <div class="aval-sucesso-ico">✓</div>
          <h3>Obrigado!</h3>
          <p>Sua avaliação foi registrada com sucesso.</p>
        </div>

      </div>
    </div>

    <!-- ============================================================
         UNITY LOADER
         ============================================================ -->
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/MVHC_UNITY_WEB.loader.js";
      var config = {
        arguments: [],
        dataUrl:      buildUrl + "/MVHC_UNITY_WEB.data.unityweb",
        frameworkUrl: buildUrl + "/MVHC_UNITY_WEB.framework.js.unityweb",
        codeUrl:      buildUrl + "/MVHC_UNITY_WEB.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName:   "LabIFCE",
        productName:   "EdukaLabsWeb",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width  = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>

    <!-- ============================================================
         SISTEMA DE AVALIAÇÃO — Firebase + Lógica
         ============================================================ -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        serverTimestamp
      } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey:            "AIzaSyACU2e2XRbrVH4_iYjF9_memwqxcxBvTzg",
        authDomain:        "mvhc-d8cde.firebaseapp.com",
        projectId:         "mvhc-d8cde",
        storageBucket:     "mvhc-d8cde.firebasestorage.app",
        messagingSenderId: "520624726072",
        appId:             "1:520624726072:web:801b9ede2d99dec62186cd"
      };

      const app           = initializeApp(firebaseConfig);
      const db            = getFirestore(app);
      const avaliacoesRef = collection(db, "avaliacoes");

      /* ----------------------------------------------------------
         Estado das estrelas
      ---------------------------------------------------------- */
      const notas = { navegacao: 0, desempenho: 0, visual: 0, conteudo: 0 };

      function initStars() {
        document.querySelectorAll('.aval-stars').forEach(group => {
          const criterio = group.dataset.criterio;
          const stars    = Array.from(group.querySelectorAll('.aval-star'));

          stars.forEach(star => {
            star.addEventListener('mouseover', () => realcarEstrelas(stars, star.dataset.valor));
            star.addEventListener('mouseout',  () => realcarEstrelas(stars, notas[criterio]));
            star.addEventListener('click', () => {
              notas[criterio] = parseInt(star.dataset.valor);
              realcarEstrelas(stars, notas[criterio]);
              stars.forEach(s => s.classList.toggle('selected', parseInt(s.dataset.valor) <= notas[criterio]));
              document.getElementById('aval-erro').textContent = '';
            });
          });
        });
      }

      function realcarEstrelas(stars, valor) {
        const v = parseInt(valor) || 0;
        stars.forEach(s => {
          const sv = parseInt(s.dataset.valor);
          s.classList.toggle('hovered', sv <= v && !s.classList.contains('selected'));
        });
      }

      /* ----------------------------------------------------------
         Envio para o Firestore
      ---------------------------------------------------------- */
      async function enviarAvaliacao() {
        const erroEl = document.getElementById('aval-erro');
        const btn    = document.getElementById('aval-btn');

        const ausentes = Object.entries(notas)
          .filter(([, v]) => v === 0)
          .map(([k]) => ({ navegacao: 'Navegação 3D', desempenho: 'Desempenho', visual: 'Visual', conteudo: 'Conteúdo' }[k]));

        if (ausentes.length) {
          erroEl.textContent = `Avalie: ${ausentes.join(', ')}`;
          return;
        }

        erroEl.textContent = '';
        btn.disabled       = true;
        btn.textContent    = 'Enviando…';

        const media = (notas.navegacao + notas.desempenho + notas.visual + notas.conteudo) / 4;
        const comentario = (document.getElementById('aval-comentario')?.value || '').trim();

        try {
          await addDoc(avaliacoesRef, {
            ...notas,
            media:     parseFloat(media.toFixed(2)),
            comentario: comentario || null,
            timestamp:  serverTimestamp()
          });

          document.getElementById('aval-form-body').style.display        = 'none';
          document.getElementById('aval-comentario').closest('label') && null;
          document.querySelector('.aval-comment-label').style.display     = 'none';
          document.getElementById('aval-comentario').style.display        = 'none';
          document.getElementById('aval-char').style.display              = 'none';
          btn.style.display                                                = 'none';
          document.getElementById('aval-sucesso').classList.remove('hidden');

          setTimeout(fecharAvaliacao, 3000);

        } catch (err) {
          console.error('Avaliação Firebase error:', err);
          erroEl.textContent = 'Erro ao enviar. Tente novamente.';
          btn.disabled       = false;
          btn.textContent    = 'Enviar Avaliação →';
        }
      }

      function resetAvaliacao() {
        Object.keys(notas).forEach(k => (notas[k] = 0));

        document.querySelectorAll('.aval-star').forEach(s => {
          s.classList.remove('selected', 'hovered');
        });

        const comentario = document.getElementById('aval-comentario');
        if (comentario) { comentario.value = ''; }
        const charEl = document.getElementById('aval-char');
        if (charEl) charEl.textContent = '0/300';

        document.getElementById('aval-erro').textContent = '';

        const formBody  = document.getElementById('aval-form-body');
        const commentLbl = document.querySelector('.aval-comment-label');
        const commentTxt = document.getElementById('aval-comentario');
        const charCount  = document.getElementById('aval-char');
        const btn        = document.getElementById('aval-btn');
        const sucesso    = document.getElementById('aval-sucesso');

        if (formBody)    formBody.style.display    = '';
        if (commentLbl)  commentLbl.style.display  = '';
        if (commentTxt)  commentTxt.style.display  = '';
        if (charCount)   charCount.style.display   = '';
        if (btn)         { btn.style.display = ''; btn.disabled = false; btn.textContent = 'Enviar Avaliação →'; }
        if (sucesso)     sucesso.classList.add('hidden');
      }

      /* ----------------------------------------------------------
         API global — chamada pelo Unity via jslib
      ---------------------------------------------------------- */
      window.abrirAvaliacao = function () {
        resetAvaliacao();
        document.getElementById('aval-overlay').classList.remove('hidden');
      };

      window.fecharAvaliacao = function () {
        document.getElementById('aval-overlay').classList.add('hidden');
      };

      window.fecharAvaliacaoOverlay = function (event) {
        if (event.target === document.getElementById('aval-overlay')) fecharAvaliacao();
      };

      window.enviarAvaliacao = enviarAvaliacao;

      initStars();
    </script>

  </body>
</html>
